<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">The Livin' Edit logo</title>
  <desc id="logoDesc">Decor objects beside the stacked wordmark The Livin' Edit.</desc>
  <defs>
    <linearGradient id="ceramic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfaf6"/>
      <stop offset="100%" stop-color="#ddd7ca"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f3ea"/>
      <stop offset="100%" stop-color="#d9d1c3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="30" y="206" width="138" height="24" rx="4" fill="url(#book)"/>
    <rect x="43" y="182" width="118" height="20" rx="4" fill="url(#book)"/>
    <rect x="56" y="160" width="97" height="17" rx="4" fill="url(#book)"/>

    <rect x="40" y="70" width="48" height="74" rx="8" fill="url(#ceramic)"/>
    <rect x="34" y="30" width="60" height="58" rx="12" fill="url(#ceramic)"/>
    <rect x="58" y="84" width="12" height="72" rx="5" fill="#d1c8bb"/>

    <rect x="130" y="100" width="52" height="97" rx="18" fill="url(#ceramic)"/>
    <path d="M121 76C121 60 133 49 149 49H165C181 49 193 60 193 76V164H121V76Z" fill="url(#ceramic)"/>
    <rect x="150" y="37" width="12" height="20" rx="6" fill="#ebe5da"/>

    <path d="M154 48L146 20" stroke="#65584b" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M157 54L175 29" stroke="#65584b" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M159 58L196 36" stroke="#65584b" stroke-width="2" stroke-linecap="round"/>
    <path d="M160 60L208 52" stroke="#65584b" stroke-width="1.8" stroke-linecap="round"/>

    <g fill="#f1ead9">
      <circle cx="144" cy="18" r="3.2"/>
      <circle cx="140" cy="23" r="2.5"/>
      <circle cx="148" cy="23" r="2.5"/>
      <circle cx="175" cy="27" r="3.1"/>
      <circle cx="171" cy="32" r="2.3"/>
      <circle cx="179" cy="32" r="2.3"/>
      <circle cx="196" cy="35" r="3.1"/>
      <circle cx="192" cy="40" r="2.3"/>
      <circle cx="200" cy="40" r="2.3"/>
      <circle cx="209" cy="51" r="3"/>
      <circle cx="205" cy="56" r="2.2"/>
      <circle cx="213" cy="56" r="2.2"/>
    </g>
  </g>

  <g fill="#1a1a1a">
    <text x="240" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="46">The</text>
    <text x="236" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700">LIVIN’</text>
    <text x="238" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="84">Edit</text>
