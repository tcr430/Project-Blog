title: The Livin' Edit
email: hello@example.com
description: >-
  A modern decor journal with practical styling guides, trend analysis, and product-ready inspiration.
baseurl: "/Project-Blog"
url: "https://tcr430.github.io"
lang: en
timezone: Europe/Lisbon
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/
include:
  - _pages

collections:
  posts:
    output: true

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: post
  -
    scope:
      path: "_pages"
    values:
      layout: page

exclude:
  - Gemfile.lock
  - node_modules
  - vendor

buy_me_a_coffee_url: "https://buymeacoffee.com/casaeditorial"
newsletter_email: "hello@example.com"