title: Casa Editorial
email: hello@example.com
description: >-
  A modern decor journal with practical styling guides, trend analysis, and product-ready inspiration.
baseurl: "/Project-Blog"
url: "https://tcr430.github.io"
lang: en
timezone: Europe/Lisbon
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/

collections:
  posts:
    output: true

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: post
  -
    scope:
      path: ""
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
