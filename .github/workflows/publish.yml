name: Publish Blog Pipeline

on:
  # GitHub cron uses UTC. 09:00 UTC maps closely to a morning publish slot in Portugal.
  schedule:
    - cron: "0 9 * * 1,3,5"
  # IMPORTANT: In repository Settings -> Pages, Source must be "GitHub Actions".
  # If "Deploy from branch" is enabled, GitHub may run an extra root Jekyll build
  # instead of using this workflow artifact.
  workflow_dispatch:
    inputs:
      trend:
        description: Optional manual trend (leave empty to use automatic trend selection)
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Flush Python logs immediately so Actions shows phase-by-phase progress.
      PYTHONUNBUFFERED: "1"
      # Opt in early to the upcoming GitHub Actions Node 24 runtime.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Run weekly pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PRODUCT_PROVIDER: ${{ secrets.PRODUCT_PROVIDER }}
          AMAZON_API_FLAVOR: ${{ secrets.AMAZON_API_FLAVOR }}
          AMAZON_MARKETPLACE: ${{ secrets.AMAZON_MARKETPLACE }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          AMAZON_PAAPI_ACCESS_KEY: ${{ secrets.AMAZON_PAAPI_ACCESS_KEY }}
          AMAZON_PAAPI_SECRET_KEY: ${{ secrets.AMAZON_PAAPI_SECRET_KEY }}
          AMAZON_FALLBACK_TO_MOCK: ${{ secrets.AMAZON_FALLBACK_TO_MOCK }}
          PINTEREST_MODE: ${{ secrets.PINTEREST_MODE }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_CLIENT_ID: ${{ secrets.PINTEREST_CLIENT_ID }}
          PINTEREST_CLIENT_SECRET: ${{ secrets.PINTEREST_CLIENT_SECRET }}
          PINTEREST_REDIRECT_URI: ${{ secrets.PINTEREST_REDIRECT_URI }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          PINTEREST_BOARD_ID_DECOR_TRENDS: ${{ secrets.PINTEREST_BOARD_ID_DECOR_TRENDS }}
          PINTEREST_BOARD_ID_STYLING_TIPS: ${{ secrets.PINTEREST_BOARD_ID_STYLING_TIPS }}
          PINTEREST_BOARD_ID_DECOR_FINDS: ${{ secrets.PINTEREST_BOARD_ID_DECOR_FINDS }}
          PINTEREST_BOARD_ID_KITCHEN_DECOR: ${{ secrets.PINTEREST_BOARD_ID_KITCHEN_DECOR }}
          PINTEREST_BOARD_ID_LIVING_ROOM_DECOR: ${{ secrets.PINTEREST_BOARD_ID_LIVING_ROOM_DECOR }}
          PINTEREST_BOARD_ID_BEDROOM_DECOR: ${{ secrets.PINTEREST_BOARD_ID_BEDROOM_DECOR }}
          PINTEREST_BOARD_ID_BATHROOM_DECOR: ${{ secrets.PINTEREST_BOARD_ID_BATHROOM_DECOR }}
          PINTEREST_BOARD_ID_KIDS_DECOR: ${{ secrets.PINTEREST_BOARD_ID_KIDS_DECOR }}
          PINTEREST_SYNC_ANALYTICS: ${{ secrets.PINTEREST_SYNC_ANALYTICS }}
        run: |
          export PRODUCT_PROVIDER="${PRODUCT_PROVIDER:-mock}"
          export AMAZON_FALLBACK_TO_MOCK="${AMAZON_FALLBACK_TO_MOCK:-true}"
          export PINTEREST_MODE="${PINTEREST_MODE:-queue}"

          if [ -n "${{ github.event.inputs.trend }}" ]; then
            python pipeline/scripts/weekly_pipeline.py "${{ github.event.inputs.trend }}" --skip-newsletter
          else
            python pipeline/scripts/weekly_pipeline.py --top-trends 1 --skip-newsletter
          fi

      - name: Commit and push generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            _posts \
            assets/img \
            assets/pins \
            _data \
            clusters \
            pipeline/data \
            pipeline/reports \
            Gemfile \
            Gemfile.lock \
            _config.yml \
            CNAME \
            robots.txt \
            sitemap.md \
            404.html \
            index.html \
            _layouts \
            _includes \
            _pages \
            assets/css \
            assets/js

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "chore(pipeline): publish generated blog content"
          git push origin "${{ github.ref_name }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node for Pagefind
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Ruby for Jekyll build
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Install Bundler dependencies
        run: bundle install

      - name: Build Jekyll site from repository root
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --destination ./_site \
            --config ./_config.yml

      - name: Build Pagefind search index
        run: npx --yes pagefind@1.1.0 --site ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
