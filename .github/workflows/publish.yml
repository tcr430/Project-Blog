name: Publish Blog Pipeline

on:
  # Scheduled automation is intentionally disabled for now.
  # We will re-enable cron-based runs in a later phase.
  # IMPORTANT: In repository Settings -> Pages, Source must be "GitHub Actions".
  # If "Deploy from branch" is enabled, GitHub may run an extra root Jekyll build
  # instead of using this workflow artifact.
  workflow_dispatch:
    inputs:
      trend:
        description: Optional manual trend (leave empty to use automatic trend selection)
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Flush Python logs immediately so Actions shows phase-by-phase progress.
      PYTHONUNBUFFERED: "1"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Run weekly pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PRODUCT_PROVIDER: ${{ secrets.PRODUCT_PROVIDER }}
          AMAZON_API_FLAVOR: ${{ secrets.AMAZON_API_FLAVOR }}
          AMAZON_MARKETPLACE: ${{ secrets.AMAZON_MARKETPLACE }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          AMAZON_PAAPI_ACCESS_KEY: ${{ secrets.AMAZON_PAAPI_ACCESS_KEY }}
          AMAZON_PAAPI_SECRET_KEY: ${{ secrets.AMAZON_PAAPI_SECRET_KEY }}
          AMAZON_FALLBACK_TO_MOCK: ${{ secrets.AMAZON_FALLBACK_TO_MOCK }}
        run: |
          if [ -n "${{ github.event.inputs.trend }}" ]; then
            python pipeline/scripts/weekly_pipeline.py "${{ github.event.inputs.trend }}"
          else
            python pipeline/scripts/weekly_pipeline.py
          fi

      - name: Commit and push generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _posts assets/img _data pipeline/data Gemfile _config.yml authors.md blog.md contact.md index.html _layouts _includes

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "chore(pipeline): publish generated blog content"
          git push origin "${{ github.ref_name }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Ruby for Jekyll build
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Install Bundler dependencies
        run: bundle install

      - name: Build Jekyll site from repository root
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --destination ./_site \
            --config ./_config.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
