name: Publish Selected Pinterest Pin

on:
  workflow_dispatch:
    inputs:
      article_slug:
        description: Article slug to publish from the Pinterest queue
        required: true
        type: string
      variant_key:
        description: Variant key to publish, usually pin-1, pin-2, pin-3, or pin-4
        required: false
        default: "pin-1"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish-selected-pin:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Generate selected article pin assets
        run: |
          PINTEREST_METADATA="_data/pinterest/${{ github.event.inputs.article_slug }}.json"
          if [ ! -f "$PINTEREST_METADATA" ]; then
            echo "Pinterest metadata not found: $PINTEREST_METADATA"
            exit 1
          fi
          python pipeline/scripts/generate_pin_assets.py "$PINTEREST_METADATA" \
            --variant-key "${{ github.event.inputs.variant_key || 'pin-1' }}"

      - name: Commit generated selected pin assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            "_data/pinterest/${{ github.event.inputs.article_slug }}.json" \
            "assets/pins/${{ github.event.inputs.article_slug }}"

          if git diff --cached --quiet; then
            echo "No selected pin asset changes to commit."
            exit 0
          fi

          git commit -m "chore(pinterest): generate selected pin assets"
          git push origin "${{ github.ref_name }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node for Pagefind
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Ruby for Jekyll build
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Install Bundler dependencies
        run: bundle install

      - name: Build Jekyll site from repository root
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build \
            --destination ./_site \
            --config ./_config.yml

      - name: Build Pagefind search index
        run: npx --yes pagefind@1.1.0 --site ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish selected Pinterest pin
        env:
          PINTEREST_MODE: publish
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_CLIENT_ID: ${{ secrets.PINTEREST_CLIENT_ID }}
          PINTEREST_CLIENT_SECRET: ${{ secrets.PINTEREST_CLIENT_SECRET }}
          PINTEREST_REDIRECT_URI: ${{ secrets.PINTEREST_REDIRECT_URI }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          PINTEREST_BOARD_ID_DECOR_TRENDS: ${{ secrets.PINTEREST_BOARD_ID_DECOR_TRENDS }}
          PINTEREST_BOARD_ID_STYLING_TIPS: ${{ secrets.PINTEREST_BOARD_ID_STYLING_TIPS }}
          PINTEREST_BOARD_ID_DECOR_FINDS: ${{ secrets.PINTEREST_BOARD_ID_DECOR_FINDS }}
          PINTEREST_BOARD_ID_KITCHEN_DECOR: ${{ secrets.PINTEREST_BOARD_ID_KITCHEN_DECOR }}
          PINTEREST_BOARD_ID_LIVING_ROOM_DECOR: ${{ secrets.PINTEREST_BOARD_ID_LIVING_ROOM_DECOR }}
          PINTEREST_BOARD_ID_BEDROOM_DECOR: ${{ secrets.PINTEREST_BOARD_ID_BEDROOM_DECOR }}
          PINTEREST_BOARD_ID_BATHROOM_DECOR: ${{ secrets.PINTEREST_BOARD_ID_BATHROOM_DECOR }}
          PINTEREST_BOARD_ID_KIDS_DECOR: ${{ secrets.PINTEREST_BOARD_ID_KIDS_DECOR }}
        run: |
          python pipeline/scripts/publish_selected_pin.py \
            --article-slug "${{ github.event.inputs.article_slug }}" \
            --variant-key "${{ github.event.inputs.variant_key || 'pin-1' }}"

      - name: Commit and push Pinterest queue state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            pipeline/data/pinterest_queue.json \
            pipeline/data/pinterest_history.json

          if git diff --cached --quiet; then
            echo "No Pinterest queue state changes to commit."
            exit 0
          fi

          git commit -m "chore(pinterest): publish selected pin"
          git push origin "${{ github.ref_name }}"
